<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | John Rey Cabarubias</title>
    
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <header class="page-header">
        <div class="container" data-aos="fade-down">
            <h1>Get In <span class="highlight">Touch</span></h1>
            <p>Feel free to reach out for collaborations or just a friendly hello!</p>
        </div>
    </header>

    <main class="container">
        
        <div class="contact-wrapper" data-aos="fade-up">
            
            <div class="contact-info-box">
                
                <div class="contact-item">
                    <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
                    <div class="text-box">
                        <span>Phone</span>
                        <a href="tel:09199501690">0919-950-1690</a>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="icon-box"><i class="fas fa-envelope"></i></div>
                    <div class="text-box">
                        <span>Email</span>
                        <a href="mailto:cabarubias.john_rey@hnu.edu.ph">cabarubias.john_rey@hnu.edu.ph</a>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="icon-box"><i class="fab fa-facebook-f"></i></div>
                    <div class="text-box">
                        <span>Facebook</span>
                        <a href="https://www.facebook.com/johnrey.cabarubz" target="_blank">John Rey Cabarubias</a>
                    </div>
                </div>

            </div>

            <form class="contact-form">
                <p class="form-title">Send me a message</p>
                <div class="input-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Your Email" required>
                </div>
                <div class="input-group">
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                </div>
                <button type="submit" class="view-btn">Send Message</button>
            </form>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 John Rey Cabarubias. All Rights Reserved.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>

</body>
</html>
